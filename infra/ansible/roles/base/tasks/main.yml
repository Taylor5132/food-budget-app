---
# ── qemu-guest-agent (Proxmox 연동, terraform agent-wait 해소) ──
- name: qemu-guest-agent 설치
  ansible.builtin.apt:
    name: qemu-guest-agent
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: qemu-guest-agent 활성화·기동
  ansible.builtin.service:
    name: qemu-guest-agent
    state: started
    enabled: true

# ── /var/lib/docker 전용 디스크 (scsi1) ──
- name: docker 데이터 디스크 존재 확인
  ansible.builtin.stat:
    path: "{{ docker_data_disk }}"
  register: docker_disk

- name: docker 데이터 디스크 ext4 포맷 (기존 fs 있으면 no-op)
  community.general.filesystem:
    fstype: ext4
    dev: "{{ docker_data_disk }}"
  when: docker_disk.stat.exists

- name: /var/lib/docker 마운트 (fstab 등록)
  ansible.posix.mount:
    path: /var/lib/docker
    src: "{{ docker_data_disk }}"
    fstype: ext4
    opts: defaults,noatime
    state: mounted
  when: docker_disk.stat.exists

# ── Docker Engine (공식 apt 저장소) ──
- name: Docker 사전 패키지
  ansible.builtin.apt:
    name: [ca-certificates, curl, gnupg]
    state: present

- name: apt keyrings 디렉토리
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Docker GPG 키
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Docker apt 저장소 등록
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ ansible_architecture | replace('x86_64', 'amd64') }}
      signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable
    filename: docker
    state: present

- name: Docker Engine + compose 플러그인 설치
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: docker 서비스 활성화·기동
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: "{{ ansible_user }} 를 docker 그룹에"
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: docker
    append: true
