---
- name: Base setup — qemu-guest-agent + Docker + /var/lib/docker 전용 디스크
  hosts: all
  become: true
  roles:
    - base

- name: 관측 에이전트 — node-exporter + cAdvisor (전 VM)
  hosts: all
  become: true
  roles:
    - monitoring_agents

- name: 모니터링 스택 — Prometheus + Grafana (fb-monitoring)
  hosts: monitoring
  become: true
  roles:
    - monitoring

- name: CI 티어 — Harbor 레지스트리 (fb-ci-harbor)
  hosts: ci
  become: true
  vars_files:
    - secrets.yml
  roles:
    - harbor
